<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LLM Agent Demo</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>LLM Agent Demo</h1>
        <p id="healthText">Checking local service...</p>
      </div>
      <div class="status" id="keyStatus">API Key</div>
    </header>

    <main class="layout">
      <section class="panel composer">
        <form id="chatForm">
          <label for="message">Prompt</label>
          <textarea id="message" name="message" rows="8" placeholder="请计算 23 * 19 + 7，并告诉我现在的本地时间。"></textarea>

          <div class="controls">
            <label class="toggle">
              <input id="useTools" type="checkbox" checked />
              <span>启用工具</span>
            </label>

            <label class="temperature">
              <span>Temperature</span>
              <input id="temperature" type="range" min="0" max="2" step="0.1" value="0.7" />
              <output id="temperatureValue">0.7</output>
            </label>
          </div>

          <button id="sendButton" type="submit">发送</button>
        </form>
      </section>

      <section class="panel response">
        <div class="section-title">Answer</div>
        <pre id="answer">等待输入...</pre>

        <div class="section-title trace-title">Agent Trace</div>
        <div id="trace" class="trace empty">暂无工具调用</div>
        <div id="logPath" class="log-path"></div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
